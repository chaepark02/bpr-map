<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPR 계약 현황 지도</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="sido.js"></script>
<script src="sigungu.js"></script>
<script src="centroids.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #f4f6fb; color: #1a2340; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Header ── */
  .header {
    background: #fff; border-bottom: 1px solid #e2e6f0;
    padding: 10px 20px; display: flex; align-items: center;
    justify-content: space-between; flex-shrink: 0; gap: 12px; flex-wrap: wrap;
    box-shadow: 0 1px 4px rgba(0,48,135,0.06);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 15px; font-weight: 700; color: #003087; letter-spacing: 0.03em; }
  .header-meta { font-size: 11px; color: #8f9ab8; }
  .nice-bar { width: 4px; height: 20px; background: #003087; border-radius: 2px; }

  /* ── Controls ── */
  .controls {
    background: #fff; border-bottom: 1px solid #e2e6f0;
    padding: 8px 20px; display: flex; gap: 0; align-items: center;
    flex-shrink: 0; flex-wrap: wrap; row-gap: 6px;
  }
  .ctrl-group { display: flex; align-items: center; gap: 6px; padding: 0 14px; }
  .ctrl-group:first-child { padding-left: 0; }
  .ctrl-sep { width: 1px; height: 22px; background: #e2e6f0; flex-shrink: 0; }
  .ctrl-label { font-size: 10px; color: #8f9ab8; font-weight: 700; letter-spacing: 0.1em; white-space: nowrap; text-transform: uppercase; }

  .btn {
    padding: 4px 12px; border-radius: 5px; border: 1px solid #d8dff0;
    background: #fff; color: #8f9ab8; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; white-space: nowrap; font-family: inherit;
  }
  .btn:hover { border-color: #003087; color: #003087; background: #f0f4ff; }
  .btn.active { background: #003087; border-color: #003087; color: #fff; box-shadow: 0 2px 8px rgba(0,48,135,0.2); }
  .btn.active-year { background: #e8f0fe; border-color: #003087; color: #003087; font-weight: 700; }

  .btn-group { display: flex; border: 1px solid #d8dff0; border-radius: 5px; overflow: hidden; }
  .btn-group .btn { border: none; border-radius: 0; border-right: 1px solid #d8dff0; }
  .btn-group .btn:last-child { border-right: none; }
  .btn-group .btn.active { box-shadow: none; }

  /* ── Data Status Bar ── */
  .data-status-bar {
    background: #f8f9fd; border-bottom: 1px solid #e2e6f0;
    padding: 6px 20px; display: flex; align-items: center; gap: 14px;
    flex-shrink: 0; flex-wrap: wrap;
  }
  .ds-label { font-size: 10px; color: #8f9ab8; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }
  .ds-sep { width: 1px; height: 16px; background: #e2e6f0; }
  .ds-item { display: flex; align-items: center; gap: 6px; }
  .ds-badge {
    padding: 2px 9px; border-radius: 3px; font-size: 11px; font-weight: 500;
    border: 1px solid #d8dff0; color: #adb8d0; background: #fff;
    display: flex; align-items: center; gap: 5px; white-space: nowrap;
  }
  .ds-badge.loaded { border-color: #003087; color: #003087; background: #e8f0fe; }
  .ds-dot { width: 6px; height: 6px; border-radius: 50%; background: #d8dff0; flex-shrink: 0; }
  .ds-badge.loaded .ds-dot { background: #003087; }
  .ds-upload-btn {
    padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600;
    border: 1px solid #d8dff0; color: #8f9ab8; background: #fff;
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .ds-upload-btn:hover { border-color: #003087; color: #003087; background: #f0f4ff; }

  /* ── Main ── */
  .main { display: flex; flex: 1; overflow: hidden; }
  #map { flex: 1; background: #e8edf5; }

  /* ── Side Panel ── */
  .side-panel {
    width: 0; background: #fff; border-left: 1px solid #e2e6f0;
    overflow: hidden; transition: width 0.2s ease; flex-shrink: 0;
    box-shadow: -2px 0 12px rgba(0,48,135,0.06);
  }
  .side-panel.open { width: 280px; }
  .panel-inner { width: 280px; padding: 18px; overflow-y: auto; height: 100%; }

  .panel-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .panel-region { font-size: 18px; font-weight: 700; color: #003087; line-height: 1.2; }
  .panel-sub { font-size: 11px; color: #8f9ab8; margin-top: 3px; }
  .panel-close { background: none; border: none; color: #adb8d0; cursor: pointer; font-size: 16px; padding: 0; line-height: 1; }
  .panel-close:hover { color: #003087; }

  .panel-kpi { background: #f0f4ff; border: 1px solid #d0dcf8; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
  .panel-kpi-num { font-size: 28px; font-weight: 800; color: #003087; line-height: 1; }
  .panel-kpi-label { font-size: 11px; color: #8f9ab8; margin-top: 3px; }
  .panel-kpi-status { display: inline-block; margin-top: 8px; padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .status-ok   { background: #003087; color: #fff; }
  .status-none { background: #eef0f5; color: #adb8d0; border: 1px solid #d8dff0; }

  .panel-section { margin-bottom: 16px; }
  .panel-section-title { font-size: 10px; font-weight: 700; color: #8f9ab8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #e8edf5; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #f4f6fb; }
  .stat-row:last-child { border-bottom: none; }
  .stat-name { font-size: 12px; color: #5a6a8a; display: flex; align-items: center; gap: 7px; }
  .stat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .stat-value { font-size: 12px; font-weight: 700; }
  .val-ok   { color: #003087; }
  .val-none { color: #c8d0e0; }
  .panel-no-data { text-align: center; padding: 16px 0; color: #c8d0e0; font-size: 12px; }

  /* ── Status bar ── */
  .statusbar { background: #fff; border-top: 1px solid #e2e6f0; padding: 5px 20px; font-size: 11px; color: #8f9ab8; flex-shrink: 0; }

  /* ── Leaflet ── */
  .leaflet-container { background: #dde4f0 !important; }
  .leaflet-tile { filter: brightness(1.05) saturate(0.5) hue-rotate(200deg); }
  .leaflet-control-zoom a { background: #fff !important; color: #003087 !important; border-color: #d8dff0 !important; font-weight: 700; }
  .leaflet-control-zoom a:hover { background: #f0f4ff !important; }

  /* ── Region Labels ── */
  .region-label {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
  }
  .region-label-text {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    font-size: 11px; font-weight: 600; color: #1a2340;
    text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff,
                 0 0 6px rgba(255,255,255,0.95);
    white-space: nowrap; pointer-events: none; text-align: center;
    transform: translate(-50%, -50%); display: inline-block;
  }
  .region-label-text.sido {
    font-size: 12px; font-weight: 700; color: #003087;
    text-shadow: 1px 1px 0 rgba(255,255,255,0.98), -1px -1px 0 rgba(255,255,255,0.98),
                 1px -1px 0 rgba(255,255,255,0.98), -1px 1px 0 rgba(255,255,255,0.98),
                 0 0 8px rgba(255,255,255,1);
  }
  .region-label-text.sigungu { font-size: 10px; font-weight: 600; color: #2a3a5c; }

  /* ── Legend ── */
  .map-legend {
    background: #fff; border: 1px solid #e2e6f0; border-radius: 8px;
    padding: 10px 14px; box-shadow: 0 2px 8px rgba(0,48,135,0.08);
  }
  .legend-title { font-size: 10px; font-weight: 700; color: #8f9ab8; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 7px; }
  .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 11px; color: #5a6a8a; }
  .legend-row:last-child { margin-bottom: 0; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }

  /* ── Loading ── */
  #loading { position:fixed; inset:0; background:#f4f6fb; display:flex; align-items:center; justify-content:center; z-index:9999; flex-direction:column; gap:12px; }
  .loading-spinner { width:32px; height:32px; border:3px solid #e2e6f0; border-top-color:#003087; border-radius:50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: #8f9ab8; font-size: 13px; }
</style>
</head>
<body>

<div id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">지도 불러오는 중…</div>
</div>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="nice-bar"></div>
    <h1>BPR 계약 현황 지도</h1>
    <span class="header-meta">전국 250개 행정구역</span>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <div class="ctrl-group">
    <span class="ctrl-label">지역</span>
    <div class="btn-group">
      <button class="btn active" id="btn-layerA" onclick="setLayer('A')">시·도</button>
      <button class="btn"        id="btn-layerB" onclick="setLayer('B')">시·군·구</button>
    </div>
  </div>
  <div class="ctrl-sep"></div>
  <div class="ctrl-group">
    <span class="ctrl-label">지역명</span>
    <button class="btn active" id="btn-labels" onclick="toggleLabels()">지역명 표시</button>
  </div>
  <div class="ctrl-sep"></div>
  <div class="ctrl-group">
    <span class="ctrl-label">연도</span>
    <button class="btn" id="btn-2025" onclick="toggleYear(2025)">2025</button>
    <button class="btn" id="btn-2026" onclick="toggleYear(2026)">2026</button>
    <button class="btn active" id="btn-yearAll" onclick="clearYear()">전체</button>
  </div>
  <div class="ctrl-sep"></div>
  <div class="ctrl-group">
    <span class="ctrl-label">계약유형</span>
    <button class="btn" id="btn-신용정보" onclick="toggleFilter('contractType','신용정보')">신용정보</button>
    <button class="btn" id="btn-전자압류" onclick="toggleFilter('contractType','전자압류')">전자압류</button>
    <button class="btn" id="btn-EGS"     onclick="toggleFilter('contractType','EGS')">EGS</button>
  </div>
  <div class="ctrl-sep"></div>
  <div class="ctrl-group">
    <span class="ctrl-label">계약분류</span>
    <button class="btn" id="btn-지방세"   onclick="toggleFilter('taxType','지방세')">지방세</button>
    <button class="btn" id="btn-세외수입" onclick="toggleFilter('taxType','세외수입')">세외수입</button>
    <button class="btn" id="btn-기타"     onclick="toggleFilter('taxType','기타')">기타</button>
  </div>
</div>

<!-- Data Status Bar -->
<div class="data-status-bar">
  <span class="ds-label">데이터 현황</span>
  <div class="ds-sep"></div>
  <div class="ds-item">
    <span id="badge-2025-type1" class="ds-badge"><span class="ds-dot"></span>2025 계약유형 — 미업로드</span>
    <input type="file" id="csv-2025-type1" accept=".csv" style="display:none" onchange="loadCSV(event,'2025','type1')">
    <button class="ds-upload-btn" onclick="document.getElementById('csv-2025-type1').click()">📂 업로드</button>
  </div>
  <div class="ds-sep"></div>
  <div class="ds-item">
    <span id="badge-2025-type2" class="ds-badge"><span class="ds-dot"></span>2025 계약분류 — 미업로드</span>
    <input type="file" id="csv-2025-type2" accept=".csv" style="display:none" onchange="loadCSV(event,'2025','type2')">
    <button class="ds-upload-btn" onclick="document.getElementById('csv-2025-type2').click()">📂 업로드</button>
  </div>
  <div class="ds-sep"></div>
  <div class="ds-item">
    <span id="badge-2026-type1" class="ds-badge"><span class="ds-dot"></span>2026 계약유형 — 미업로드</span>
    <input type="file" id="csv-2026-type1" accept=".csv" style="display:none" onchange="loadCSV(event,'2026','type1')">
    <button class="ds-upload-btn" onclick="document.getElementById('csv-2026-type1').click()">📂 업로드</button>
  </div>
  <div class="ds-sep"></div>
  <div class="ds-item">
    <span id="badge-2026-type2" class="ds-badge"><span class="ds-dot"></span>2026 계약분류 — 미업로드</span>
    <input type="file" id="csv-2026-type2" accept=".csv" style="display:none" onchange="loadCSV(event,'2026','type2')">
    <button class="ds-upload-btn" onclick="document.getElementById('csv-2026-type2').click()">📂 업로드</button>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div id="map"></div>
  <div class="side-panel" id="sidePanel">
    <div class="panel-inner" id="panelInner"></div>
  </div>
</div>
<div class="statusbar"><span id="status-text">CSV를 업로드하면 지도에 계약 현황이 표시됩니다.</span></div>

<script>
// ═══════════════════════════════════
//  STATE
// ═══════════════════════════════════
const state = {
  layer: 'A',
  year: null,
  contractType: null,
  taxType: null,
  showLabels: true,
};

let data1 = [];
let data2 = [];

const uploadStatus = {
  '2025-type1': null, '2025-type2': null,
  '2026-type1': null, '2026-type2': null,
};

// ═══════════════════════════════════
//  NICE COLORS
// ═══════════════════════════════════
const C = {
  active:        '#003087',   // NICE 메인 블루 — 계약 체결
  activeHover:   '#00409e',
  activeLight:   '#ccd8f0',   // 선택 하이라이트
  none:          '#d4d9e5',   // 미체결 — 회색
  noneHover:     '#bec4d4',
  border:        '#b8c2d8',
  borderActive:  '#003087',
  selected:      '#7fa0d8',
};

// ═══════════════════════════════════
//  MAP INIT
// ═══════════════════════════════════
const map = L.map('map', {
  center: [36.5, 127.8], zoom: 7,
  zoomControl: true, attributionControl: false, preferCanvas: false,
});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
  maxZoom: 19
}).addTo(map);

// ═══════════════════════════════════
//  DATA HELPERS
// ═══════════════════════════════════
function getRows(dataset, regionName, isLayerA) {
  const layerStr = isLayerA ? 'A' : 'B';
  const field    = isLayerA ? '시도' : '시군구';
  return dataset.filter(d => {
    if (d.Layer !== layerStr) return false;
    if (d[field] !== regionName) return false;
    if (state.year !== null && d.계약연도 !== state.year) return false;
    return true;
  });
}

function isActive(regionName, isLayerA) {
  const { contractType, taxType } = state;
  if (contractType) return getRows(data1, regionName, isLayerA).some(r => r[contractType] === 1);
  if (taxType)      return getRows(data2, regionName, isLayerA).some(r => r[taxType] === 1);
  return getRows(data1, regionName, isLayerA).some(r => r.계약여부 === 1)
      || getRows(data2, regionName, isLayerA).some(r => r.계약여부 === 1);
}

// ═══════════════════════════════════
//  GEO LAYER
// ═══════════════════════════════════
let geoLayer = null;
let labelLayer = null;
let selectedFeatureLayer = null;

function getStyle(name, isLayerA) {
  const on = isActive(name, isLayerA);
  return {
    fillColor:   on ? C.active : C.none,
    fillOpacity: on ? 0.75 : 0.55,
    color:       on ? C.borderActive : C.border,
    weight: 1.2,
  };
}

function renderMap() {
  if (geoLayer) { map.removeLayer(geoLayer); geoLayer = null; }
  clearLabels();
  selectedFeatureLayer = null;

  const isLayerA = state.layer === 'A';
  const geojson  = isLayerA ? SIDO_GEOJSON : SIGUNGU_GEOJSON;

  geoLayer = L.geoJSON(geojson, {
    style: f => getStyle(f.properties.name, isLayerA),
    onEachFeature: (feature, layer) => {
      const name = feature.properties.name;
      const sido = feature.properties.sido || name;

      layer.on('mouseover', () => {
        if (layer !== selectedFeatureLayer) {
          const on = isActive(name, isLayerA);
          layer.setStyle({
            fillColor:   on ? C.activeHover : C.noneHover,
            fillOpacity: 0.85,
            color:       '#003087', weight: 2,
          });
        }
        setStatus(`${isLayerA ? '' : sido + ' · '}${name} — 클릭하면 상세 정보를 볼 수 있습니다`);
      });
      layer.on('mouseout', () => {
        if (layer !== selectedFeatureLayer) geoLayer.resetStyle(layer);
        setStatus('지역을 클릭하면 상세 정보가 표시됩니다.');
      });
      layer.on('click', () => {
        if (selectedFeatureLayer) geoLayer.resetStyle(selectedFeatureLayer);
        selectedFeatureLayer = layer;
        layer.setStyle({ fillColor: C.activeLight, fillOpacity: 0.9, color: '#003087', weight: 2.5 });
        openPanel(name, sido, isLayerA);
      });
    }
  }).addTo(map);

  if (state.showLabels) renderLabels(isLayerA);
}

// ═══════════════════════════════════
//  LABELS
// ═══════════════════════════════════
function clearLabels() {
  if (labelLayer) { map.removeLayer(labelLayer); labelLayer = null; }
}

function renderLabels(isLayerA) {
  clearLabels();
  labelLayer = L.layerGroup();
  const centroids = isLayerA ? SIDO_CENTROIDS : SIGUNGU_CENTROIDS;
  const cls = isLayerA ? 'sido' : 'sigungu';

  Object.entries(centroids).forEach(([name, latlng]) => {
    const marker = L.marker(latlng, {
      icon: L.divIcon({
        className: 'region-label',
        html: `<div class="region-label-text ${cls}">${name}</div>`,
        iconSize: null,
        iconAnchor: null,
      }),
      interactive: false,
      keyboard: false,
    });
    labelLayer.addLayer(marker);
  });
  labelLayer.addTo(map);
}

function toggleLabels() {
  state.showLabels = !state.showLabels;
  const btn = document.getElementById('btn-labels');
  if (state.showLabels) {
    btn.classList.add('active');
    btn.textContent = '지역명 표시';
    renderLabels(state.layer === 'A');
  } else {
    btn.classList.remove('active');
    btn.textContent = '지역명 숨김';
    clearLabels();
  }
}

// ═══════════════════════════════════
//  SIDE PANEL
// ═══════════════════════════════════
function openPanel(name, sido, isLayerA) {
  const rows1 = getRows(data1, name, isLayerA);
  const rows2 = getRows(data2, name, isLayerA);
  const hasContract = rows1.some(r => r.계약여부 === 1) || rows2.some(r => r.계약여부 === 1);
  const noData = rows1.length === 0 && rows2.length === 0;

  const ct = { 신용정보:0, 전자압류:0, EGS:0 };
  rows1.forEach(r => { ct.신용정보+=r.신용정보||0; ct.전자압류+=r.전자압류||0; ct.EGS+=r.EGS||0; });
  const tt = { 지방세:0, 세외수입:0, 기타:0 };
  rows2.forEach(r => { tt.지방세+=r.지방세||0; tt.세외수입+=r.세외수입||0; tt.기타+=r.기타||0; });

  const total = ct.신용정보+ct.전자압류+ct.EGS+tt.지방세+tt.세외수입+tt.기타;
  const yearLabel = state.year ? `${state.year}년` : '전체 연도';

  document.getElementById('panelInner').innerHTML = `
    <div class="panel-header">
      <div>
        <div class="panel-region">${name}</div>
        <div class="panel-sub">${isLayerA ? '시·도 단위' : sido} · ${yearLabel}</div>
      </div>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>

    <div class="panel-kpi">
      ${noData
        ? `<div class="panel-kpi-num" style="font-size:14px;color:#adb8d0">데이터 없음</div>
           <div class="panel-kpi-label">CSV를 먼저 업로드해주세요</div>`
        : `<div class="panel-kpi-num">${hasContract ? total + '건' : '—'}</div>
           <div class="panel-kpi-label">총 계약 건수</div>
           <span class="panel-kpi-status ${hasContract ? 'status-ok' : 'status-none'}">${hasContract ? '계약 체결' : '미체결'}</span>`
      }
    </div>

    ${rows1.length > 0 ? `
    <div class="panel-section">
      <div class="panel-section-title">계약유형</div>
      ${[['신용정보','#003087'],['전자압류','#4f6fbf'],['EGS','#0066cc']].map(([k,c]) => `
        <div class="stat-row">
          <span class="stat-name"><span class="stat-dot" style="background:${c}"></span>${k}</span>
          <span class="stat-value ${ct[k]?'val-ok':'val-none'}">${ct[k]?`✓ ${ct[k]}건`:'—'}</span>
        </div>`).join('')}
    </div>` : ''}

    ${rows2.length > 0 ? `
    <div class="panel-section">
      <div class="panel-section-title">계약분류</div>
      ${[['지방세','#1a7a4a'],['세외수입','#b07010'],['기타','#8f9ab8']].map(([k,c]) => `
        <div class="stat-row">
          <span class="stat-name"><span class="stat-dot" style="background:${c}"></span>${k}</span>
          <span class="stat-value ${tt[k]?'val-ok':'val-none'}">${tt[k]?`✓ ${tt[k]}건`:'—'}</span>
        </div>`).join('')}
    </div>` : ''}

    ${!noData ? `
    <div class="panel-section">
      <div class="panel-section-title">연도별 현황</div>
      ${[2025,2026].map(yr => {
        const layerStr = isLayerA ? 'A' : 'B';
        const field    = isLayerA ? '시도' : '시군구';
        const ok = [...data1,...data2].some(d => d.Layer===layerStr && d[field]===name && d.계약연도===yr && d.계약여부===1);
        const uploaded = [uploadStatus[yr+'-type1'],uploadStatus[yr+'-type2']].some(s=>s!==null);
        return `<div class="stat-row">
          <span class="stat-name">${yr}년</span>
          <span class="stat-value ${ok?'val-ok':'val-none'}">${!uploaded?'미업로드':ok?'✓ 체결':'—'}</span>
        </div>`;
      }).join('')}
    </div>` : ''}
  `;
  document.getElementById('sidePanel').classList.add('open');
}

function closePanel() {
  document.getElementById('sidePanel').classList.remove('open');
  if (selectedFeatureLayer) { geoLayer.resetStyle(selectedFeatureLayer); selectedFeatureLayer = null; }
}

// ═══════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════
function setLayer(l) {
  state.layer = l;
  document.getElementById('btn-layerA').classList.toggle('active', l==='A');
  document.getElementById('btn-layerB').classList.toggle('active', l==='B');
  closePanel(); renderMap();
}

function toggleYear(yr) {
  state.year = state.year === yr ? null : yr;
  document.getElementById('btn-2025').className    = 'btn' + (state.year===2025 ? ' active-year' : '');
  document.getElementById('btn-2026').className    = 'btn' + (state.year===2026 ? ' active-year' : '');
  document.getElementById('btn-yearAll').className = 'btn' + (state.year===null  ? ' active' : '');
  renderMap();
}

function clearYear() {
  state.year = null;
  document.getElementById('btn-2025').className    = 'btn';
  document.getElementById('btn-2026').className    = 'btn';
  document.getElementById('btn-yearAll').className = 'btn active';
  renderMap();
}

function toggleFilter(type, value) {
  const other     = type==='contractType' ? 'taxType' : 'contractType';
  const otherKeys = type==='contractType' ? ['지방세','세외수입','기타'] : ['신용정보','전자압류','EGS'];
  const thisKeys  = type==='contractType' ? ['신용정보','전자압류','EGS'] : ['지방세','세외수입','기타'];
  state[other] = null;
  otherKeys.forEach(k => document.getElementById('btn-'+k).classList.remove('active'));
  state[type] = state[type]===value ? null : value;
  thisKeys.forEach(k => document.getElementById('btn-'+k).classList.toggle('active', state[type]===k));
  renderMap();
}

// ═══════════════════════════════════
//  CSV LOADER
// ═══════════════════════════════════
function loadCSV(event, year, type) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.trim().split(/\r?\n/);
    const headers = lines[0].split(',').map(h => h.trim().replace(/^\uFEFF/,''));
    const rows = lines.slice(1).filter(l=>l.trim()).map(line => {
      const vals = line.split(',');
      const obj = {};
      headers.forEach((h,i) => {
        const v = (vals[i]||'').trim();
        obj[h] = (!isNaN(v) && v!=='') ? Number(v) : v;
      });
      return obj;
    });
    const yr = Number(year);
    if (type==='type1') { data1 = data1.filter(d=>d.계약연도!==yr); data1=[...data1,...rows]; }
    else                { data2 = data2.filter(d=>d.계약연도!==yr); data2=[...data2,...rows]; }

    const key = year+'-'+type;
    uploadStatus[key] = { filename: file.name, rows: rows.length };
    updateBadge(year, type, file.name, rows.length);
    renderMap();
    setStatus(`✓ ${file.name} 로드 완료 — ${rows.length}행 반영됨`);
  };
  reader.readAsText(file, 'UTF-8');
}

function updateBadge(year, type, filename, rowCount) {
  const el = document.getElementById(`badge-${year}-${type}`);
  const label = type==='type1' ? '계약유형' : '계약분류';
  el.className = 'ds-badge loaded';
  el.innerHTML = `<span class="ds-dot"></span>${year} ${label} — ${filename} (${rowCount}행)`;
}

// ═══════════════════════════════════
//  LEGEND
// ═══════════════════════════════════
const legend = L.control({ position: 'bottomleft' });
legend.onAdd = () => {
  const div = L.DomUtil.create('div', 'map-legend');
  div.innerHTML = `
    <div class="legend-title">계약 현황</div>
    <div class="legend-row"><span class="legend-swatch" style="background:#003087"></span>계약 체결</div>
    <div class="legend-row"><span class="legend-swatch" style="background:#d4d9e5;border:1px solid #b8c2d8"></span>미체결 / 데이터 없음</div>
  `;
  return div;
};
legend.addTo(map);

function setStatus(msg) { document.getElementById('status-text').textContent = msg; }

// ═══════════════════════════════════
//  BOOT
// ═══════════════════════════════════
window.addEventListener('load', () => {
  renderMap();
  document.getElementById('loading').style.display = 'none';
  setStatus('CSV를 업로드하면 지도에 계약 현황이 표시됩니다.');
});
</script>
